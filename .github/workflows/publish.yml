name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure package registry auth
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: node ./tools/configure-package-registry-auth.mjs

      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality

      - name: Bump package version
        id: version
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip release]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
